<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Address Sheet Generator</title>

<style>

body{
  font-family:Arial;
  background:#f2f2f2;
  padding:20px;
}

.container{
  max-width:1000px;
  margin:auto;
}

textarea{
  width:100%;
  height:200px;
  padding:10px;
  font-size:14px;
  margin-bottom:10px;
}

button{
  padding:12px;
  margin-top:5px;
  width:100%;
  background:#007bff;
  color:white;
  border:none;
  border-radius:5px;
  font-size:16px;
}

/* Responsive + A4 */
.preview{
  margin-top:20px;
  background:white;
  padding:0;

  width:100%;
  max-width:210mm;
  min-height:297mm;

  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.grid{
  display:flex;
  flex-wrap:wrap;
}

.row{
  display:flex;
  width:100%;
  margin-bottom:10px;

  break-inside: avoid;
  page-break-inside: avoid;
}

.card{
  width:33.33%;
  border:1px solid #ddd;
  padding:8px;
  font-size:14px;
  line-height:1.4;
  white-space:pre-line;

  break-inside: avoid;
  page-break-inside: avoid;
}

/* Mobile */
@media(max-width:700px){

  body{
    padding:10px;
  }

  .container{
    padding:0;
  }

  .card{
    width:100%;
  }

}

</style>

</head>

<body>

<div class="container">

<h2>Paste WhatsApp Address List</h2>

<textarea id="input" placeholder="Paste full address list here..."></textarea>

<button onclick="generate()">Generate Preview</button>

<button onclick="downloadPDF()">Download PDF</button>

<div class="preview" id="printArea">
  <div id="sheet" class="grid"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

function generate(){

  let text = document.getElementById("input").value

  let entries = text.split(/\n\s*\n/)
  entries = entries.map(e => e.trim()).filter(e => e.length > 0)

  let sheet = document.getElementById("sheet")
  sheet.innerHTML = ""

  for(let i=0;i<entries.length;i+=3){

    let row = document.createElement("div")
    row.className = "row"

    for(let j=0;j<3;j++){

      if(entries[i+j]){

        let card = document.createElement("div")
        card.className="card"
        card.innerText = entries[i+j]

        row.appendChild(card)

      }

    }

    sheet.appendChild(row)

  }

}

/* ✅ MOBILE + DESKTOP PERFECT PDF */
function downloadPDF(){

  const element = document.getElementById("printArea");

  const opt = {
    margin:       [5,5,5,5], // mm
    filename:     'address-sheet.pdf',
    image:        { type: 'jpeg', quality: 1 },
    html2canvas:  { scale: 2, useCORS: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(element).save();
}

</script>

</body>
</html>
